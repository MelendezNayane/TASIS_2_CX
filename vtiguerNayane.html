<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario | vTiger</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.9/css/select2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">

    <style>
        /* Diseño Mejorado Estilo "Card" */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 { 
            color: #1a73e8; 
            margin-top: 0; 
            text-align: center;
            font-size: 24px;
        }
        .form-group { margin-bottom: 15px; }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: 600; 
            color: #444;
            font-size: 14px;
        }
        input[type="text"], select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        input:focus { border-color: #1a73e8; outline: none; }
        
        /* Estilo para el input de teléfono */
        .iti { width: 100%; }
        
        .submit-btn { 
            width: 100%;
            margin-top: 25px; 
            padding: 14px; 
            cursor: pointer; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .submit-btn:hover { background: #1557b0; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Registro de Usuario</h2>

        <form id="__vtigerWebForm_2" name="WebForms_LanginPage_1" action="https://pucp6.od2.vtiger.com/modules/Webforms/capture.php" method="post" accept-charset="utf-8" enctype="multipart/form-data">
            
            <input type="hidden" name="publicid" value="5802ec5f9b8f6cb135e9ddbe57cc4f4b">
            <input type="hidden" name="urlencodeenable" value="1">
            <input type="hidden" name="name" value="WebForms_LanginPage_1">
            <input type="hidden" name="__vtCurrency" value="1">

            <div class="form-group">
                <label>Apellido *</label>
                <input type="text" name="lastname" maxlength="80" required placeholder="Ingresa tu apellido">
                <input type="checkbox" name="vtField" value="1" style="display:none !important" tabindex="-1" autocomplete="off">
            </div>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="firstname" maxlength="40" placeholder="Ingresa tu nombre">
            </div>

            <div class="form-group">
                <label>Teléfono Celular</label>
                <input type="text" id="mobile_input" name="mobile" maxlength="50" data-type="phone">
            </div>
            
            <div style="display:none;">
                <select name="leadsource">
                    <option value="Web Site" selected>Web Site</option>
                </select>
                <select name="cf_leads_estadoonboarding">
                    <option value="Datos" selected>Datos</option>
                </select>
            </div>

            <input type="submit" value="Iniciar Registro" id="vtigerFormSubmitBtn_2" class="submit-btn">
            
            <p class="footer-note">* Campos obligatorios para continuar con la validación.</p>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.9/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"></script>

    <script type="text/javascript">
        $(document).ready(function() {
            
            // 1. Inicializar Teléfono con formato Perú
            var phoneElement = document.querySelector("#mobile_input");
            var iti = window.intlTelInput(phoneElement, {
                initialCountry: "pe",
                separateDialCode: true,
                preferredCountries: ["pe", "ar", "cl", "co"],
                utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
            });

            // 2. Estilizar selects visibles
            $("#__vtigerWebForm_2 select:visible").select2({
                minimumResultsForSearch: Infinity
            });

            // 3. Gestión del Envío
            var form = document.getElementById("__vtigerWebForm_2");
            
            form.onsubmit = function(e) {
                // Validar Apellido
                var lastName = form.elements["lastname"].value.trim();
                if (lastName === "") {
                    alert("Por favor, ingresa tu apellido.");
                    return false;
                }

                // --- EL CAMBIO CLAVE: Formatear teléfono antes de enviar ---
                // Obtenemos el número en formato E.164 (ej: +51987654321)
                var fullNumber = iti.getNumber();
                if (iti.isValidNumber()) {
                    phoneElement.value = fullNumber; 
                } else {
                    alert("Por favor, ingresa un número de teléfono válido.");
                    return false;
                }
                
                // Deshabilitar botón
                document.getElementById("vtigerFormSubmitBtn_2").disabled = true;
                document.getElementById("vtigerFormSubmitBtn_2").value = "Enviando...";
                
                return true;
            };
        });
    </script>
</body>
</html>
