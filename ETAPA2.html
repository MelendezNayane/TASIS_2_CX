<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Identidad</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .step { display: none; }
        .active { display: block; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: #1a73e8; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #1557b0; }
        .error-msg { color: red; font-size: 14px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="etapa_dni" class="step active">
        <h2>Paso 1: Identificación</h2>
        <p>Por favor, ingresa tu número de DNI:</p>
        <input type="text" id="input_dni" placeholder="DNI (8 dígitos)" maxlength="8">
        <button onclick="enviarDNI()">Siguiente</button>
    </div>

    <div id="etapa_biometria" class="step">
        <h2>Paso 2: Biometría</h2>
        <p>Resuelve la suma para validar que eres humano:</p>
        <label><strong>¿Cuánto es 5 + 2?</strong></label>
        <input type="number" id="input_suma" placeholder="Tu respuesta">
        <p id="error_suma" class="error-msg">Respuesta incorrecta. Inténtalo de nuevo.</p>
        <button onclick="validarBiometria()">Validar</button>
    </div>

    <div id="etapa_terminos" class="step">
        <h2>Paso 3: Términos</h2>
        <p>Acepta las condiciones para finalizar:</p>
        <label style="display: block; margin-bottom: 20px; cursor: pointer;">
            <input type="checkbox" id="check_terminos"> Acepto los términos y condiciones.
        </label>
        <button onclick="enviarFinal()">Finalizar Registro</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const tokenSeguro = params.get('token');
    // URL de tu Webhook de n8n
    const WEBHOOK_N8N = "https://ksnores.app.n8n.cloud/webhook-test/41d55ec5-3ee7-42bd-8b7c-817a3458ef2d";

    // Función auxiliar para enviar datos a n8n
    async function postData(payload) {
        try {
            await fetch(WEBHOOK_N8N, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: tokenSeguro,
                    ...payload
                })
            });
        } catch (error) {
            console.error("Error enviando a n8n:", error);
        }
    }

    // --- LÓGICA PASO 1 ---
    async function enviarDNI() {
        const dni = document.getElementById('input_dni').value;
        if (dni.length < 8) {
            alert("Ingresa un DNI válido.");
            return;
        }

        await postData({ fase: "dni_capturado", dni: dni });

        document.getElementById('etapa_dni').classList.remove('active');
        document.getElementById('etapa_biometria').classList.add('active');
    }

    // --- LÓGICA PASO 2 ---
    async function validarBiometria() {
        const suma = document.getElementById('input_suma').value;
        const esCorrecto = (suma === "7");

        if (!esCorrecto) {
            // Notificar a n8n que falló
            await postData({ fase: "biometria", estado: "no validado", intento: suma });
            document.getElementById('error_suma').style.display = 'block';
            return;
        }

        // Notificar a n8n que tuvo éxito
        await postData({ fase: "biometria", estado: "validado" });

        document.getElementById('etapa_biometria').classList.remove('active');
        document.getElementById('etapa_terminos').classList.add('active');
    }

    // --- LÓGICA PASO 3 ---
    async function enviarFinal() {
        const acepto = document.getElementById('check_terminos').checked;
        
        if (!acepto) {
            alert("Debes aceptar los términos.");
            return;
        }

        await postData({ fase: "terminos_aceptados", estado: "completado" });

        // Redirigir a la página de éxito que creamos antes
        window.location.href = "success.html";
    }
</script>

</body>
</html>
